<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/icons.png">
</head>

<body>

    <body>
        <div class="game-wrapper">
            <h1>Simon Says Game</h1>
            <h2>Press Start to begin</h2>

            <button id="start-btn">Start Game</button>
            <button id="mute-btn">🔊 Sound On</button>

            <div class="score-container">
                <p class="score">Current Level: <span id="current-level">0</span></p>
                <p class="score">Highest Score: <span id="high-score">0</span></p>
            </div>

            <div class="btn-container">
                <div class="line-one">
                    <div class="btn red" id="red"></div>
                    <div class="btn green" id="green"></div>
                </div>
                <div class="line-two">
                    <div class="btn yellow" id="yellow"></div>
                    <div class="btn purple" id="purple"></div>
                </div>
            </div>
        </div>
    </body>

    <script src="app.js"></script>
</body>

</html>
